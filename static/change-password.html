<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>變更密碼 — ESI FreeSwitch Dashboard</title>
<style>
  :root {
    --bg: #eef4fb; --panel: #ffffff; --panel2: #f4f8fd;
    --border: #c8d9ee; --accent: #0277bd; --accent-bright: #0288d1;
    --red: #c62828; --text: #0a1929; --label: #1e3d5c;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
    background: var(--bg); color: var(--text);
    font-family: -apple-system, "Segoe UI", "Microsoft JhengHei", sans-serif;
  }
  .card {
    width: 100%; max-width: 380px;
    background: var(--panel); border: 1px solid var(--border);
    border-radius: 12px; padding: 32px;
    box-shadow: 0 8px 24px rgba(2,41,72,0.08);
  }
  h1 { font-size: 17px; margin: 0 0 8px; color: var(--accent); }
  .hint { font-size: 13px; color: var(--label); margin-bottom: 20px; line-height: 1.5; }
  label { display: block; font-size: 13px; color: var(--label); margin: 14px 0 6px; }
  input {
    width: 100%; padding: 10px 12px;
    border: 1px solid var(--border); border-radius: 8px;
    background: var(--panel2); color: var(--text); font-size: 14px;
  }
  input:focus { outline: none; border-color: var(--accent); }
  button {
    width: 100%; margin-top: 22px; padding: 11px;
    background: var(--accent); color: #fff; border: none; border-radius: 8px;
    font-size: 15px; font-weight: 600; cursor: pointer;
  }
  button:hover:not(:disabled) { background: var(--accent-bright); }
  button:disabled { opacity: 0.6; cursor: not-allowed; }
  .msg {
    margin-top: 14px; padding: 10px 12px; border-radius: 8px;
    font-size: 13px; display: none;
  }
  .msg.error { background: rgba(198,40,40,0.08); border: 1px solid var(--red); color: var(--red); }
  .msg.ok { background: rgba(0,137,123,0.08); border: 1px solid #00897b; color: #00897b; }
  .msg.show { display: block; }
</style>
</head>
<body>

<div class="card">
  <h1>請變更密碼</h1>
  <div class="hint" id="hint-text">首次登入需設定新密碼後才能繼續使用。</div>

  <form id="change-form" autocomplete="off">
    <label for="old-password">目前密碼</label>
    <input type="password" id="old-password" autocomplete="current-password" required>

    <label for="new-password">新密碼（至少 8 碼）</label>
    <input type="password" id="new-password" autocomplete="new-password" minlength="8" required>

    <label for="new-password2">確認新密碼</label>
    <input type="password" id="new-password2" autocomplete="new-password" minlength="8" required>

    <div id="msg" class="msg"></div>

    <button type="submit" id="submit-btn">變更密碼</button>
  </form>
</div>

<script>
const API_BASE = 'http://192.168.100.209:3000';

const form      = document.getElementById('change-form');
const msgBox    = document.getElementById('msg');
const submitBtn = document.getElementById('submit-btn');
const hintText  = document.getElementById('hint-text');

const params = new URLSearchParams(window.location.search);
const forced = params.get('forced') === '1';
if (!forced) {
  hintText.textContent = '變更密碼';
}

const token = localStorage.getItem('access_token');
if (!token) {
  window.location.href = '/login.html';
}

function showMsg(text, type) {
  msgBox.textContent = text;
  msgBox.className = `msg show ${type}`;
}

form.addEventListener('submit', async (e) => {
  e.preventDefault();

  const oldPassword = document.getElementById('old-password').value;
  const newPassword  = document.getElementById('new-password').value;
  const newPassword2 = document.getElementById('new-password2').value;

  if (newPassword.length < 8) {
    showMsg('新密碼長度至少 8 碼', 'error');
    return;
  }
  if (newPassword !== newPassword2) {
    showMsg('兩次輸入的新密碼不一致', 'error');
    return;
  }
  if (newPassword === oldPassword) {
    showMsg('新密碼不可與目前密碼相同', 'error');
    return;
  }

  submitBtn.disabled = true;
  submitBtn.textContent = '處理中...';

  try {
    const res = await fetch(`${API_BASE}/api/auth/change-password`, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${token}`,
      },
      body: JSON.stringify({ old_password: oldPassword, new_password: newPassword }),
    });

    let data;
    try {
      data = await res.json();
    } catch (parseErr) {
      showMsg(`伺服器回應格式錯誤（HTTP ${res.status}）`, 'error');
      return;
    }

    if (res.status === 401) {
      // token 失效（例如剛好過期），導回登入頁重新登入
      localStorage.removeItem('access_token');
      window.location.href = '/login.html';
      return;
    }

    if (!res.ok) {
      showMsg(data.detail || '變更失敗', 'error');
      return;
    }

    // 密碼變更成功：依設計「權限改變需重新登入才生效」，一律清除 token 強制重新登入
    showMsg('密碼已更新，即將導向登入頁...', 'ok');
    localStorage.removeItem('access_token');
    setTimeout(() => { window.location.href = '/login.html'; }, 1200);
  } catch (err) {
    showMsg(`連線失敗：${err.message}`, 'error');
  } finally {
    submitBtn.disabled = false;
    submitBtn.textContent = '變更密碼';
  }
});
</script>

</body>
</html>
